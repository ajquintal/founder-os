name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Placeholder public env so the build/preview succeed without secrets.
# Real values (and Stripe secrets) belong in Supabase + the host, never in CI logs.
env:
  VITE_SUPABASE_URL: https://placeholder.supabase.co
  VITE_SUPABASE_ANON_KEY: public-anon-placeholder-key
  VITE_APP_URL: http://localhost:4173

jobs:
  verify:
    name: Lint · Typecheck · Unit · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Requires a committed package-lock.json (created by your first `npm install`).
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 3

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      # playwright.config.ts builds + previews the app itself (webServer).
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
